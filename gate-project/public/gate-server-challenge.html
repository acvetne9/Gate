<!-- Gate Protection: Verification Script -->
<script>
(function() {
  'use strict';

  // Configuration - REPLACE WITH YOUR VALUES
  var GATE_API_KEY = 'YOUR_API_KEY'; // Replace with your actual Gate API key
  var GATE_API_URL = 'https://bakzzkadgmyvvvnpuvki.supabase.co/functions/v1/check-access';
  var GATE_PAYMENT_URL = 'https://security-gate.lovable.app/bot-payment';

  // Record page load time for timing analysis
  var PAGE_LOAD_TIMESTAMP = Date.now();

  // Get API key from script tag if available
  var scripts = document.getElementsByTagName('script');
  for (var i = 0; i < scripts.length; i++) {
    var key = scripts[i].getAttribute('data-gate-api-key');
    if (key) {
      GATE_API_KEY = key;
      break;
    }
  }

  // Elements
  var gate = document.getElementById('gate-gate');
  var title = document.getElementById('gate-gate-title');
  var message = document.getElementById('gate-gate-message');
  var btn = document.getElementById('gate-gate-btn');

  // Show verifying state
  document.body.classList.add('gate-verifying');

  // Quick bot checks before server verification
  function quickBotCheck() {
    var indicators = [];

    // Check for automation
    if (navigator.webdriver) indicators.push('webdriver');
    if (window._phantom || window.phantom) indicators.push('phantom');
    if (window.__nightmare) indicators.push('nightmare');
    if (window._selenium) indicators.push('selenium');

    // Check for missing features
    if (!window.chrome && navigator.userAgent.indexOf('Chrome') > -1) {
      indicators.push('fake_chrome');
    }

    return indicators;
  }

  // Generate fingerprint
  function getFingerprint() {
    try {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('Gate', 2, 2);

      return {
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        screen: { w: screen.width, h: screen.height },
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        canvas: canvas.toDataURL().slice(-50),
        plugins: navigator.plugins ? navigator.plugins.length : 0
      };
    } catch (e) {
      return { error: true };
    }
  }

  // Show blocked state
  function showBlocked(reason) {
    document.body.classList.remove('gate-verifying');
    title.textContent = 'Access Blocked';
    message.textContent = 'Automated access detected. Subscribe for full access.';
    btn.style.display = 'inline-block';
    // Show the payment URL box
    var urlBox = document.getElementById('gate-payment-url');
    if (urlBox) urlBox.style.display = 'block';
    btn.href = GATE_PAYMENT_URL + '?reason=' + encodeURIComponent(reason) +
               '&return=' + encodeURIComponent(window.location.href);
  }

  // Show allowed state
  function showAllowed() {
    document.body.classList.remove('gate-verifying');
    document.body.classList.add('gate-verified');

    // Remove protected class from content
    var protected = document.querySelectorAll('.gate-content-protected');
    for (var i = 0; i < protected.length; i++) {
      protected[i].classList.remove('gate-content-protected');
    }
  }

  // Solve proof-of-work challenge (async using Web Crypto)
  function solveProofOfWork(challenge, difficulty, callback) {
    var requiredPrefix = '';
    for (var i = 0; i < difficulty; i++) requiredPrefix += '0';
    var nonce = 0;

    function tryNonce() {
      var data = challenge + ':' + nonce;
      var encoder = new TextEncoder();

      crypto.subtle.digest('SHA-256', encoder.encode(data)).then(function(hashBuffer) {
        var hashArray = new Uint8Array(hashBuffer);
        var hashHex = '';
        for (var j = 0; j < hashArray.length; j++) {
          hashHex += hashArray[j].toString(16).padStart(2, '0');
        }

        if (hashHex.indexOf(requiredPrefix) === 0) {
          callback({ challenge: challenge, nonce: nonce, hash: hashHex });
        } else {
          nonce++;
          if (nonce > 10000000) {
            console.error('[Gate] POW timeout');
            showAllowed(); // Fail open
            return;
          }
          // Yield to UI every 1000 iterations
          if (nonce % 1000 === 0) {
            setTimeout(tryNonce, 0);
          } else {
            tryNonce();
          }
        }
      });
    }

    tryNonce();
  }

  // Verify access with server
  function verifyAccess(powSolution) {
    var botIndicators = quickBotCheck();

    // If obvious bot, block immediately
    if (botIndicators.length > 0) {
      showBlocked(botIndicators.join(','));
      return;
    }

    // Build request body
    var requestBody = {
      apiKey: GATE_API_KEY,
      page: window.location.pathname,
      userAgent: navigator.userAgent,
      fingerprint: getFingerprint(),
      referrer: document.referrer,
      pageLoadTimestamp: PAGE_LOAD_TIMESTAMP
    };

    // Include POW solution if provided
    if (powSolution) {
      requestBody.powSolution = powSolution;
    }

    // Verify with server
    var xhr = new XMLHttpRequest();
    xhr.open('POST', GATE_API_URL, true);
    xhr.setRequestHeader('Content-Type', 'application/json');

    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4) {
        try {
          var response = JSON.parse(xhr.responseText);

          // Handle POW challenge
          if (response.status === 'pow_required' && response.powChallenge) {
            console.log('[Gate] Solving proof-of-work challenge...');
            solveProofOfWork(response.powChallenge.challenge, response.powChallenge.difficulty, function(solution) {
              console.log('[Gate] POW solved, retrying...');
              verifyAccess(solution);
            });
            return;
          }

          if (response.allowed === true) {
            showAllowed();
          } else {
            showBlocked(response.reason || 'verification_failed');
          }
        } catch (e) {
          // On error, allow access (fail open for humans)
          showAllowed();
        }
      }
    };

    xhr.onerror = function() {
      // On network error, allow access
      showAllowed();
    };

    xhr.send(JSON.stringify(requestBody));
  }

  // Start verification when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', verifyAccess);
  } else {
    verifyAccess();
  }
})();
</script>
